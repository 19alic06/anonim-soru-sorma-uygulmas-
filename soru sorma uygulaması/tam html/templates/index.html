<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bana Anonim Soru Sor!</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fe375f 0%, #ff5722 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 35px 25px;
            text-align: center;
            position: relative;
        }

       
        .avatar-area {
            width: 80px;
            height: 80px;
            background: #f1f2f6;
            border-radius: 50%;
            margin: -75px auto 15px auto;
            border: 5px solid #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2c3e50;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #f8f9fa;
            border: 2px solid #ededed;
            border-radius: 20px;
            padding: 15px;
            font-size: 16px;
            color: #333;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: #fe375f;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(254, 55, 95, 0.1);
        }

        textarea::placeholder {
            color: #bbb;
        }

        button {
            width: 100%;
            background: #222222;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        button:hover {
            background: #000000;
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #b2bec3;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar-area"></div>
    
    <h2>Bana Anonim Soru Sor!</h2>
    <p>Benim hakkımda ne düşünüyorsun? İçinde kalmasın, anonim olarak gönder. Kim olduğun asla görünmeyecek!</p>
    
    <div class="input-group">
        <textarea id="soruKutusu" placeholder="Dürüst ol, çekinme..."></textarea>
    </div>
    
    <button onclick="gonder()">Soruyu Gönder </button>
    
    <div class="footer-text"> Tamamen anonimdir. IP veya konum bilgisi saklanmaz.</div>
</div>

<script>
function gonder() {
    const soruKutusu = document.getElementById('soruKutusu');
    const soru = soruKutusu.value.trim();
    
   
    if(!soru) {
        Swal.fire({
            icon: 'warning',
            title: 'Hoppala!',
            text: 'Boş mesaj gönderemezsin, bir şeyler yazmalısın.',
            confirmButtonColor: '#fe375f'
        });
        return;
    }

    const btn = document.querySelector('button');
    btn.disabled = true;
    btn.innerText = 'Gönderiliyor...';

    
    fetch('/soru-gonder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ soru: soru })
    })
    .then(res => res.json())
    .then(data => {
        if(data.durum === 'success') {
            Swal.fire({
                icon: 'success',
                title: 'Başarıyla gitti',
                text: 'Sorun anonim olarak iletildi. Bakalım ne cevap gelecek?',
                confirmButtonColor: '#222222'
            });
            soruKutusu.value = ''; 
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Hata!',
                text: data.mesaj || 'Mesaj gönderilirken bir sorun oluştu.',
                confirmButtonColor: '#fe375f'
            });
        }
    })
    .catch(err => {
        Swal.fire({
            icon: 'error',
            title: 'Sistem Hatası!',
            text: 'Sunucuya bağlanılamadı.',
            confirmButtonColor: '#fe375f'
        });
    })
    .finally(() => {
      
        btn.disabled = false;
        btn.innerText = 'Soruyu Gönder';
    });
}
</script>

</body>
</html>
